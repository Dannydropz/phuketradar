<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clip to Radar Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --card-bg: rgba(20, 20, 20, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --text-muted: #a0a0a0;
      --primary: #f97316; /* orange-500 */
      --primary-hover: #ea580c; /* orange-600 */
      --primary-glow: rgba(249, 115, 22, 0.2);
      --success: #10b981;
      --error: #ef4444;
      --input-bg: rgba(0, 0, 0, 0.4);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(249, 115, 22, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 480px;
      width: 420px;
      overflow: hidden;
      padding: 24px;
      position: relative;
    }

    /* Ambient background glows */
    body::before {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
      top: -30px;
      right: -30px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
      bottom: -30px;
      left: -30px;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      z-index: 1;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      transform: translateY(0);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logo-icon {
      font-size: 28px;
      animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px var(--primary)); }
      100% { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--primary)); }
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, #a0a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
      letter-spacing: 0.2px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: rgba(0, 0, 0, 0.6);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 12px var(--primary-glow);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .status-msg {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
      display: block;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      display: block;
    }

    .status-checking {
      background: rgba(249, 115, 22, 0.1);
      border: 1px solid rgba(249, 115, 22, 0.2);
      color: var(--primary);
      display: block;
    }

    .info-footer {
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <span class="logo-icon">📡</span>
        <h1>Clip to Radar</h1>
      </div>
      <div class="tagline">Personal Sourcing Extension</div>
    </header>

    <form id="options-form">
      <div class="form-group">
        <label for="backend-url">Phuket Radar Base URL</label>
        <input type="url" id="backend-url" required placeholder="https://phuketradar.com" value="https://phuketradar.com">
      </div>

      <div class="form-group">
        <label for="api-key">Clip API Key</label>
        <input type="password" id="api-key" required placeholder="Paste secret API key">
      </div>

      <div class="button-group">
        <button type="submit" class="btn-primary">Save Config</button>
        <button type="button" id="test-btn" class="btn-secondary">Test Connection</button>
      </div>
    </form>

    <div id="status" class="status-msg"></div>

    <div class="info-footer">
      This extension is loaded unpacked. Your API Key is stored securely on your local machine in Chrome Storage.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
